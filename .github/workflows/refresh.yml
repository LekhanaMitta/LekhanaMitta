name: Refresh Dashboard Data

on:
  schedule:
    - cron: "0 */3 * * *"    # every 3 hours
  push:
    branches: [main]           # also refresh on every commit to this repo
  repository_dispatch:         # triggered by cross-repo commits (SQL challenge)
    types: [sql-update]
  workflow_dispatch:           # run manually from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch all data
        env:
          MONKEYTYPE_APE_KEY: ${{ secrets.MONKEYTYPE_APE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQL_REPO: LekhanaMitta/8WeekSQLChallenge
          LC_USERNAME: LekhanaRM
          DATA_JSON_PATH: data.json
        run: python scripts/fetch_data.py

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .        # deploy the whole repo root as the site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
