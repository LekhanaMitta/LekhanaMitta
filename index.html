<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LekhanaRM · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0D0F14;
  --surface:#13161E;
  --surface2:#1A1E28;
  --border:#252A38;
  --text:#E8EAF0;
  --muted:#5A6278;
  --accent:#7C6EFA;   /* purple — main */
  --green:#3DDC84;    /* SQL / success */
  --gold:#F5C542;     /* monkey */
  --red:#FF6B6B;      /* hard LC */
  --orange:#FFA94D;   /* medium LC */
  --blue:#5BC8F5;     /* easy LC */
  --display:'Syne',sans-serif;
  --body:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;padding:32px 20px 80px;}
a{color:inherit;text-decoration:none;}

/* ── layout ── */
.wrap{max-width:1000px;margin:0 auto;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.logo{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:-.5px;}
.logo span{color:var(--accent);}
.stamp{font-family:var(--mono);font-size:12px;color:var(--muted);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0 0 auto 0;height:2px;}
.card.monkey::before{background:linear-gradient(90deg,var(--gold),#ff9a3c);}
.card.leetcode::before{background:linear-gradient(90deg,var(--orange),var(--red));}
.card.sql::before{background:linear-gradient(90deg,var(--green),#1fa8a8);}
.card.jobs::before{background:linear-gradient(90deg,var(--blue),var(--accent));}
.card.tasks{grid-column:1/-1;}
.card.tasks::before{background:linear-gradient(90deg,var(--accent),#c084fc);}

.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.card-title{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.card-link{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:6px;transition:all .15s;}
.card-link:hover{color:var(--text);border-color:var(--accent);}

/* ── big number ── */
.stat-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;}
.stat{display:flex;flex-direction:column;gap:3px;}
.stat-val{font-family:var(--display);font-size:32px;font-weight:800;line-height:1;}
.stat-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.stat-val.gold{color:var(--gold);}
.stat-val.green{color:var(--green);}
.stat-val.blue{color:var(--blue);}

/* ── mode pills ── */
.modes{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.mode-pill{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:12px;cursor:pointer;transition:border-color .15s;}
.mode-pill:hover,.mode-pill.active{border-color:var(--gold);}
.mode-pill .pname{color:var(--muted);margin-bottom:4px;}
.mode-pill .pwpm{font-size:16px;font-weight:500;color:var(--gold);}

/* ── LC ring ── */
.lc-body{display:flex;align-items:center;gap:24px;}
.ring-wrap{position:relative;width:130px;height:130px;flex:none;}
#lcCanvas{width:130px;height:130px;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.ring-total{font-family:var(--display);font-size:26px;font-weight:800;}
.ring-sub{font-family:var(--mono);font-size:10px;color:var(--muted);}
.lc-stats{display:flex;flex-direction:column;gap:10px;flex:1;}
.lc-row{display:flex;align-items:center;gap:10px;}
.lc-dot{width:10px;height:10px;border-radius:50%;flex:none;}
.lc-row span{font-family:var(--mono);font-size:13px;}
.lc-row b{margin-left:auto;font-family:var(--display);font-size:16px;font-weight:700;}
.lc-pct{font-family:var(--mono);font-size:11px;color:var(--muted);}
.lc-acc{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:10px;}

/* tooltip */
.tooltip{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:12px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:99;}

/* ── SQL progress ── */
.sql-weeks{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.week-row{display:flex;align-items:center;gap:12px;}
.week-label{font-family:var(--mono);font-size:11px;color:var(--muted);width:64px;flex:none;}
.week-bar{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.week-fill{height:100%;border-radius:4px;background:var(--green);transition:width .6s cubic-bezier(.2,.8,.2,1);}
.week-fill.empty{background:transparent;}
.week-status{font-family:var(--mono);font-size:11px;width:56px;text-align:right;flex:none;}
.week-status.done{color:var(--green);}
.week-status.wip{color:var(--gold);}
.week-status.todo{color:var(--muted);}
.sql-summary{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:12px;}
.sql-summary b{color:var(--green);}

/* ── jobs ── */
.jobs-stats{display:flex;gap:20px;margin-bottom:16px;}
.add-job-btn{font-family:var(--display);font-size:13px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;cursor:pointer;transition:opacity .15s;}
.add-job-btn:hover{opacity:.85;}
.job-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;padding-right:4px;}
.job-list::-webkit-scrollbar{width:4px;}
.job-list::-webkit-scrollbar-track{background:transparent;}
.job-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.job-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s;}
.job-item:hover{border-color:var(--blue);}
.job-item .ji-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.job-item .ji-title{font-size:14px;font-weight:600;}
.job-item .ji-date{font-family:var(--mono);font-size:11px;color:var(--muted);}
.job-item .ji-company{font-family:var(--mono);font-size:12px;color:var(--muted);}
.job-item .ji-badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;}
.badge-applied{background:#1a3a4a;color:var(--blue);}
.badge-oa{background:#2a2a1a;color:var(--gold);}
.badge-interview{background:#1a2a1a;color:var(--green);}
.badge-rejected{background:#2a1a1a;color:var(--red);}
.job-detail{border-color:var(--accent) !important;}

/* ── tasks ── */
.task-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.task-input{flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--body);font-size:14px;padding:10px 14px;border-radius:8px;}
.task-input:focus{outline:none;border-color:var(--accent);}
.task-input::placeholder{color:var(--muted);}
.btn-small{font-family:var(--display);font-size:12px;font-weight:700;padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--text);cursor:pointer;white-space:nowrap;}
.btn-small:hover{border-color:var(--accent);color:var(--accent);}
.btn-small.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-small.primary:hover{opacity:.85;}
.filters{display:flex;gap:4px;}
.f-btn{font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid transparent;border-radius:6px;background:none;color:var(--muted);cursor:pointer;}
.f-btn.on{border-color:var(--border);color:var(--text);background:var(--surface2);}
.task-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
.task-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;}
.task-cb{appearance:none;width:18px;height:18px;border:1.5px solid var(--muted);border-radius:5px;flex:none;cursor:pointer;position:relative;transition:all .15s;}
.task-cb:checked{background:var(--accent);border-color:var(--accent);}
.task-cb:checked::after{content:'';position:absolute;left:5px;top:2px;width:5px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);}
.task-text{flex:1;background:none;border:none;color:var(--text);font-family:var(--body);font-size:14px;}
.task-text:focus{outline:none;}
.task-item.done .task-text{color:var(--muted);text-decoration:line-through;}
.task-note-btn{font-family:var(--mono);font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 4px;}
.task-note-btn:hover,.task-note-btn.on{color:var(--accent);}
.task-del{font-family:var(--mono);font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 4px;}
.task-del:hover{color:var(--red);}
.task-notes-area{margin:6px 28px 0;background:var(--surface);border:1px solid var(--border);border-radius:6px;width:calc(100% - 56px);min-height:54px;padding:8px 10px;font-family:var(--body);font-size:13px;color:var(--text);resize:vertical;display:none;}
.task-notes-area.open{display:block;}
.task-notes-area::placeholder{color:var(--muted);}
.task-notes-area:focus{outline:none;border-color:var(--accent);}
.task-meta{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}
.task-progress{display:flex;align-items:center;gap:10px;margin-top:14px;}
.t-bar{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.t-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;}
.t-pct{font-family:var(--mono);font-size:12px;color:var(--muted);}
.empty-state{text-align:center;padding:32px;color:var(--muted);font-family:var(--mono);font-size:13px;}

/* ── modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:var(--display);font-size:18px;font-weight:800;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{font-family:var(--mono);font-size:11px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--body);font-size:14px;padding:10px 12px;border-radius:8px;}
.form-group textarea{min-height:80px;resize:vertical;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);}
.form-group select option{background:var(--surface2);}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.loading{color:var(--muted);font-family:var(--mono);font-size:13px;padding:20px 0;}
.loading::after{content:'';animation:dots 1.2s infinite;}
@keyframes dots{0%{content:'';}33%{content:'.';}66%{content:'..';}100%{content:'...';}}'
.error-msg{color:var(--red);font-family:var(--mono);font-size:12px;padding:8px 0;}

@media(max-width:600px){
  .lc-body{flex-direction:column;}
  .stat-val{font-size:26px;}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Lekhana<span>RM</span> · dashboard</div>
    <div class="stamp" id="stamp">loading…</div>
  </header>

  <div class="grid">

    <!-- ═══ MONKEYTYPE ═══ -->
    <div class="card monkey">
      <div class="card-head">
        <span class="card-title">🐒 Monkeytype</span>
        <a class="card-link" href="https://monkeytype.com/profile/theUnbeknownst" target="_blank" rel="noopener">theUnbeknownst ↗</a>
      </div>
      <div id="mt-body"><div class="loading">fetching</div></div>
    </div>

    <!-- ═══ LEETCODE ═══ -->
    <div class="card leetcode">
      <div class="card-head">
        <span class="card-title">💻 LeetCode</span>
        <a class="card-link" href="https://leetcode.com/LekhanaRM" target="_blank" rel="noopener">LekhanaRM ↗</a>
      </div>
      <div id="lc-body"><div class="loading">fetching</div></div>
    </div>

    <!-- ═══ 8-WEEK SQL ═══ -->
    <div class="card sql">
      <div class="card-head">
        <span class="card-title">🗄️ 8-Week SQL Challenge</span>
        <a class="card-link" href="https://github.com/LekhanaMitta/8WeekSQLChallenge" target="_blank" rel="noopener">repo ↗</a>
      </div>
      <div id="sql-body"><div class="loading">fetching</div></div>
    </div>

    <!-- ═══ JOB TRACKER ═══ -->
    <div class="card jobs">
      <div class="card-head">
        <span class="card-title">📋 Job Applications</span>
        <button class="add-job-btn" id="openJobModal">+ Add Application</button>
      </div>
      <div id="jobs-body"></div>
    </div>

    <!-- ═══ DAILY TASKS (full width) ═══ -->
    <div class="card tasks">
      <div class="card-head">
        <span class="card-title">✅ Daily Tasks</span>
        <div class="filters">
          <button class="f-btn on" data-f="all">all</button>
          <button class="f-btn" data-f="active">active</button>
          <button class="f-btn" data-f="done">done</button>
        </div>
      </div>
      <div class="task-controls">
        <input class="task-input" id="taskInput" placeholder="Add a task and press Enter…" autocomplete="off"/>
        <button class="btn-small primary" id="taskAddBtn">Add</button>
        <button class="btn-small" id="clearDone">Clear done</button>
      </div>
      <div class="task-list" id="taskList"></div>
      <div class="task-progress">
        <div class="t-bar"><div class="t-fill" id="tFill"></div></div>
        <span class="t-pct" id="tPct">0%</span>
      </div>
    </div>

  </div>
</div>

<!-- Job Modal -->
<div class="modal-bg" id="jobModal">
  <div class="modal">
    <h2 id="modalTitle">Add Application</h2>
    <div class="form-group">
      <label>Job Title</label>
      <input id="jTitle" type="text" placeholder="Software Engineer Intern"/>
    </div>
    <div class="form-group">
      <label>Company</label>
      <input id="jCompany" type="text" placeholder="Acme Corp"/>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="jStatus">
        <option value="applied">Applied</option>
        <option value="oa">OA / Assessment</option>
        <option value="interview">Interview</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div class="form-group">
      <label>Job Summary / Notes</label>
      <textarea id="jSummary" placeholder="Role description, why you applied, referral, etc."></textarea>
    </div>
    <div class="form-group">
      <label>Resume Version</label>
      <input id="jResume" type="text" placeholder="e.g. resume_v3_swe.pdf"/>
    </div>
    <div class="form-group">
      <label>Date Applied</label>
      <input id="jDate" type="date"/>
    </div>
    <div class="modal-btns">
      <button class="btn-small" id="cancelJob">Cancel</button>
      <button class="btn-small primary" id="saveJob">Save</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
// ══════════════════════════════════════════
//  DATA — loaded from data.json (built by GitHub Action)
//  Falls back to demo data if not found
// ══════════════════════════════════════════
const DATA_URL = './data.json';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const today = () => new Date().toISOString().slice(0,10);

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('no data.json');
    return await r.json();
  } catch {
    // Demo fallback so the page still shows something without the Action
    return {
      monkeytype: {
        username: 'theUnbeknownst',
        lastUpdated: new Date().toISOString(),
        modes: [
          { name:'time 15', wpm:95, raw:102, acc:93.2, con:88.1 },
          { name:'time 60', wpm:88, raw:96,  acc:94.5, con:91.3 },
          { name:'words 50',wpm:91, raw:99,  acc:93.8, con:89.7 }
        ]
      },
      leetcode: {
        username:'LekhanaRM',
        total:338, easy:147, medium:174, hard:17,
        totalQuestions:2800, acceptance:76,
        lastUpdated: new Date().toISOString()
      },
      sql: {
        weeks: [
          {n:1,name:"Danny's Diner",commits:5,done:true},
          {n:2,name:"Pizza Runner",commits:3,done:true},
          {n:3,name:"Foodie-Fi",commits:2,done:true},
          {n:4,name:"Data Bank",commits:1,done:false},
          {n:5,name:"Data Mart",commits:0,done:false},
          {n:6,name:"Clique Bait",commits:0,done:false},
          {n:7,name:"Balanced Tree",commits:0,done:false},
          {n:8,name:"Fresh Segments",commits:0,done:false}
        ],
        lastUpdated: new Date().toISOString()
      }
    };
  }
}

// ══════════════════════════════════════════  STAMP
document.getElementById('stamp').textContent =
  new Date().toLocaleString('en-GB',{weekday:'long',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

// ══════════════════════════════════════════  MONKEYTYPE
function renderMonkey(data) {
  if (!data) { document.getElementById('mt-body').innerHTML = '<div class="error-msg">Could not load — check your ApeKey secret.</div>'; return; }
  const modes = data.modes || [];
  if (!modes.length) { document.getElementById('mt-body').innerHTML = '<div class="error-msg">No recent data.</div>'; return; }

  let active = 0;
  function renderMode(i) {
    const m = modes[i];
    return `
      <div class="stat-row">
        <div class="stat"><span class="stat-val gold">${m.wpm}</span><span class="stat-lbl">WPM</span></div>
        <div class="stat"><span class="stat-val" style="color:#aaa">${m.raw}</span><span class="stat-lbl">RAW</span></div>
        <div class="stat"><span class="stat-val" style="color:#5BC8F5">${m.acc}%</span><span class="stat-lbl">ACC</span></div>
        <div class="stat"><span class="stat-val" style="color:#c084fc">${m.con}%</span><span class="stat-lbl">CON</span></div>
      </div>`;
  }

  const pillsHtml = modes.map((m,i) =>
    `<button class="mode-pill${i===0?' active':''}" data-idx="${i}">
      <div class="pname">${m.name}</div>
      <div class="pwpm">${m.wpm} <small style="font-size:10px;color:var(--muted)">wpm</small></div>
    </button>`).join('');

  document.getElementById('mt-body').innerHTML = `
    <div id="mt-stats">${renderMode(0)}</div>
    <div class="modes" id="mt-pills">${pillsHtml}</div>`;

  document.getElementById('mt-pills').addEventListener('click', e => {
    const btn = e.target.closest('.mode-pill');
    if (!btn) return;
    document.querySelectorAll('.mode-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('mt-stats').innerHTML = renderMode(+btn.dataset.idx);
  });
}

// ══════════════════════════════════════════  LEETCODE
function renderLC(data) {
  if (!data) { document.getElementById('lc-body').innerHTML = '<div class="error-msg">Could not load.</div>'; return; }
  const {total,easy,medium,hard,acceptance} = data;
  const slices = [
    {label:'Easy',   val:easy,   color:'#5BC8F5'},
    {label:'Medium', val:medium, color:'#FFA94D'},
    {label:'Hard',   val:hard,   color:'#FF6B6B'},
  ];

  document.getElementById('lc-body').innerHTML = `
    <div class="lc-body">
      <div class="ring-wrap">
        <canvas id="lcCanvas" width="130" height="130"></canvas>
        <div class="ring-center">
          <span class="ring-total">${total}</span>
          <span class="ring-sub">solved</span>
        </div>
      </div>
      <div class="lc-stats">
        ${slices.map(s=>`
          <div class="lc-row">
            <span class="lc-dot" style="background:${s.color}"></span>
            <span>${s.label}</span>
            <span class="lc-pct">${Math.round(s.val/total*100)}%</span>
            <b style="color:${s.color}">${s.val}</b>
          </div>`).join('')}
        <div class="lc-acc">Acceptance rate: ${acceptance}%</div>
      </div>
    </div>`;

  // Draw ring
  const canvas = document.getElementById('lcCanvas');
  const ctx = canvas.getContext('2d');
  const cx=65,cy=65,r=52,lw=16;
  const total_slices = slices.reduce((a,s)=>a+s.val,0);
  let start = -Math.PI/2;
  const tooltip = document.getElementById('tooltip');
  const segments = [];
  slices.forEach(s => {
    const sweep = (s.val/total_slices)*(2*Math.PI);
    segments.push({...s, start, end:start+sweep});
    start += sweep;
  });

  function draw(highlightIdx=-1) {
    ctx.clearRect(0,0,130,130);
    segments.forEach((s,i)=>{
      ctx.beginPath();
      ctx.arc(cx,cy,r,s.start,s.end);
      ctx.lineWidth = i===highlightIdx ? lw+4 : lw;
      ctx.strokeStyle = s.color;
      ctx.stroke();
    });
  }
  draw();

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const dx=mx-cx, dy=my-cy, dist=Math.sqrt(dx*dx+dy*dy);
    if (dist < r-lw/2 || dist > r+lw/2) { draw(); tooltip.style.opacity=0; return; }
    let angle = Math.atan2(dy,dx);
    if (angle < -Math.PI/2) angle += 2*Math.PI;
    const hit = segments.findIndex(s => angle>=s.start && angle<=s.end);
    if (hit<0) { draw(); tooltip.style.opacity=0; return; }
    draw(hit);
    const s=segments[hit];
    tooltip.textContent = `${s.label}: ${s.val} (${Math.round(s.val/total_slices*100)}%)`;
    tooltip.style.left=(e.clientX+12)+'px';
    tooltip.style.top=(e.clientY-28)+'px';
    tooltip.style.opacity=1;
  });
  canvas.addEventListener('mouseleave',()=>{draw();tooltip.style.opacity=0;});
}

const WEEK_NAMES = [
  "Danny's Diner","Pizza Runner","Foodie-Fi","Data Bank",
  "Data Mart","Clique Bait","Balanced Tree","Fresh Segments"
];
function renderSQL(data) {
  if (!data) { document.getElementById('sql-body').innerHTML = '<div class="error-msg">Could not load.</div>'; return; }
  const weeks = data.weeks || [];
  const done = weeks.filter(w=>w.done).length;
  const rows = weeks.map(w=>{
    const pct = w.done ? 100 : (w.commits>0?50:0);
    const status = w.done ? 'done' : (w.commits>0?'wip':'todo');
    const label = w.done ? '✓ done' : (w.commits>0?`${w.commits} commits`:'–');
    return `
      <div class="week-row">
        <span class="week-label">Week ${w.n}</span>
        <div class="week-bar"><div class="week-fill${pct===0?' empty':''}" style="width:${pct}%"></div></div>
        <span class="week-status ${status}">${label}</span>
      </div>`;
  }).join('');
  document.getElementById('sql-body').innerHTML = `
    <div class="sql-weeks">${rows}</div>
    <div class="sql-summary"><b>${done}</b> of 8 case studies completed</div>`;
}

// ══════════════════════════════════════════  JOBS
const JOBS_KEY = 'lrm-jobs-v1';
let jobs = [];
try { jobs = JSON.parse(localStorage.getItem(JOBS_KEY)) || []; } catch{}
let editingJobId = null;

const BADGE = {applied:'badge-applied',oa:'badge-oa',interview:'badge-interview',rejected:'badge-rejected'};
const BADGE_LBL = {applied:'Applied',oa:'OA',interview:'Interview',rejected:'Rejected'};

function saveJobs(){localStorage.setItem(JOBS_KEY,JSON.stringify(jobs));}

function renderJobs() {
  const today_str = today();
  const todayCount = jobs.filter(j=>j.date===today_str).length;
  const totalCount = jobs.length;
  const interviewCount = jobs.filter(j=>j.status==='interview').length;
  document.getElementById('jobs-body').innerHTML = `
    <div class="jobs-stats">
      <div class="stat"><span class="stat-val blue">${totalCount}</span><span class="stat-lbl">Total</span></div>
      <div class="stat"><span class="stat-val gold">${todayCount}</span><span class="stat-lbl">Today</span></div>
      <div class="stat"><span class="stat-val green">${interviewCount}</span><span class="stat-lbl">Interviews</span></div>
    </div>
    <div class="job-list" id="jobList">
      ${jobs.length===0?'<div class="empty-state">No applications yet. Add your first one!</div>':
        [...jobs].reverse().map(j=>`
          <div class="job-item" data-id="${j.id}">
            <div class="ji-top">
              <span class="ji-title">${esc(j.title)}</span>
              <span class="ji-badge ${BADGE[j.status]||'badge-applied'}">${BADGE_LBL[j.status]||j.status}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="ji-company">${esc(j.company)}${j.resume?` · <em>${esc(j.resume)}</em>`:''}</span>
              <span class="ji-date">${j.date}</span>
            </div>
            ${j.summary?`<div style="font-size:12px;color:var(--muted);margin-top:6px">${esc(j.summary).slice(0,120)}${j.summary.length>120?'…':''}</div>`:''}
          </div>`).join('')}
    </div>`;

  document.getElementById('jobList')?.querySelectorAll('.job-item').forEach(el=>{
    el.addEventListener('click',()=>openEdit(el.dataset.id));
  });
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function openEdit(id){
  const j = jobs.find(x=>x.id===id);
  if(!j)return;
  editingJobId = id;
  document.getElementById('modalTitle').textContent='Edit Application';
  document.getElementById('jTitle').value=j.title||'';
  document.getElementById('jCompany').value=j.company||'';
  document.getElementById('jStatus').value=j.status||'applied';
  document.getElementById('jSummary').value=j.summary||'';
  document.getElementById('jResume').value=j.resume||'';
  document.getElementById('jDate').value=j.date||today();
  document.getElementById('jobModal').classList.add('open');
}

document.getElementById('openJobModal').addEventListener('click',()=>{
  editingJobId=null;
  document.getElementById('modalTitle').textContent='Add Application';
  ['jTitle','jCompany','jSummary','jResume'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('jStatus').value='applied';
  document.getElementById('jDate').value=today();
  document.getElementById('jobModal').classList.add('open');
});
document.getElementById('cancelJob').addEventListener('click',()=>document.getElementById('jobModal').classList.remove('open'));
document.getElementById('jobModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});

document.getElementById('saveJob').addEventListener('click',()=>{
  const title = document.getElementById('jTitle').value.trim();
  const company = document.getElementById('jCompany').value.trim();
  if(!title||!company){alert('Title and company are required.');return;}
  const entry = {
    id: editingJobId||uid(),
    title, company,
    status: document.getElementById('jStatus').value,
    summary: document.getElementById('jSummary').value.trim(),
    resume: document.getElementById('jResume').value.trim(),
    date: document.getElementById('jDate').value||today()
  };
  if(editingJobId){ jobs=jobs.map(j=>j.id===editingJobId?entry:j); }
  else { jobs.push(entry); }
  saveJobs(); renderJobs();
  document.getElementById('jobModal').classList.remove('open');
});

// ══════════════════════════════════════════  TASKS
const TASKS_KEY = 'lrm-tasks-v1';
let tasks = [];
try{tasks=JSON.parse(localStorage.getItem(TASKS_KEY))||[];}catch{}
let taskFilter='all';
function saveTasks(){localStorage.setItem(TASKS_KEY,JSON.stringify(tasks));}

function visibleTasks(){
  if(taskFilter==='active') return tasks.filter(t=>!t.done);
  if(taskFilter==='done') return tasks.filter(t=>t.done);
  return tasks;
}
function renderTasks(){
  const list=visibleTasks();
  const done=tasks.filter(t=>t.done).length;
  const total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('tFill').style.width=pct+'%';
  document.getElementById('tPct').textContent=pct+'%';
  const el=document.getElementById('taskList');
  if(!list.length){el.innerHTML=`<div class="empty-state">${tasks.length===0?'No tasks yet. Add one above.':'No tasks in this view.'}</div>`;return;}
  el.innerHTML=list.map(t=>`
    <div class="task-item${t.done?' done':''}" data-id="${t.id}" draggable="true">
      <input class="task-cb" type="checkbox" ${t.done?'checked':''} data-action="check"/>
      <input class="task-text" value="${esc(t.title)}" data-action="edit"/>
      <span class="task-meta">${fmtDate(t.created)}</span>
      <button class="task-note-btn${t.notes?' on':''}" data-action="note">${t.notes?'❝':'+ note'}</button>
      <button class="task-del" data-action="del">✕</button>
    </div>
    ${t.notes!==undefined?`<textarea class="task-notes-area${t._open?' open':''}" data-id="${t.id}" placeholder="Notes…">${t.notes||''}</textarea>`:''}
  `).join('');

  el.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('change',e=>{if(e.target.dataset.action==='check'){const t=getTask(e.target.closest('[data-id]').dataset.id);if(t){t.done=e.target.checked;saveTasks();renderTasks();}}});
    btn.addEventListener('input',e=>{if(e.target.dataset.action==='edit'){const t=getTask(e.target.closest('[data-id]').dataset.id);if(t){t.title=e.target.value;saveTasks();}}});
    btn.addEventListener('click',e=>{
      const action=e.currentTarget.dataset.action;
      const id=e.currentTarget.closest('[data-id]')?.dataset.id;
      if(action==='del'){tasks=tasks.filter(t=>t.id!==id);saveTasks();renderTasks();}
      if(action==='note'){const t=getTask(id);if(t){t._open=!t._open;saveTasks();renderTasks();}}
    });
  });
  el.querySelectorAll('.task-notes-area').forEach(ta=>{
    ta.addEventListener('input',e=>{const t=getTask(e.target.dataset.id);if(t){t.notes=e.target.value;saveTasks();}});
  });
}
function getTask(id){return tasks.find(t=>t.id===id);}
function fmtDate(iso){try{return new Date(iso).toLocaleDateString('en-GB',{month:'short',day:'numeric'});}catch{return '';}}

document.getElementById('taskAddBtn').addEventListener('click',addTask);
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
function addTask(){
  const v=document.getElementById('taskInput').value.trim();
  if(!v)return;
  tasks.push({id:uid(),title:v,done:false,notes:'',created:new Date().toISOString()});
  document.getElementById('taskInput').value='';
  saveTasks();renderTasks();
}
document.getElementById('clearDone').addEventListener('click',()=>{
  if(!tasks.some(t=>t.done))return;
  if(confirm('Remove all completed tasks?')){tasks=tasks.filter(t=>!t.done);saveTasks();renderTasks();}
});
document.querySelectorAll('.f-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    taskFilter=b.dataset.f;
    document.querySelectorAll('.f-btn').forEach(x=>x.classList.toggle('on',x===b));
    renderTasks();
  });
});
